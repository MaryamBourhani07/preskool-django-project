{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

         <div class="page-wrapper">
            <div class="content container-fluid">
               <div class="page-header">
                  <div class="row align-items-center">
                     <div class="col">
                        <h3 class="page-title">Edit Teacher</h3>
                        <ul class="breadcrumb">
                           <li class="breadcrumb-item"><a href="{% url 'faculty:teacher_list' %}">Teachers</a></li>
                           <li class="breadcrumb-item active">Edit Teacher</li>
                        </ul>
                     </div>
                  </div>
               </div>
               <div class="row">
                  <div class="col-sm-12">
                     <div class="card">
                        <div class="card-body">
                           <form method="POST" enctype="multipart/form-data">
                              {% csrf_token %}
                              <div class="row">
                                 <div class="col-12">
                                    <h5 class="form-title"><span>Teacher Information</span></h5>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>First Name</label>
                                       <input type="text" class="form-control" name="first_name" value="{{ teacher.first_name }}" required>
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Last Name</label>
                                       <input type="text" class="form-control" name="last_name" value="{{ teacher.last_name }}" required>
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Email</label>
                                       <input type="email" class="form-control" name="email" value="{{ teacher.email }}" required>
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Phone</label>
                                       <input type="text" class="form-control" name="phone" value="{{ teacher.phone }}" required>
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Department</label>
                                       <select class="form-control" name="department">
                                          <option value="">Select Department</option>
                                          {% for department in departments %}
                                          <option value="{{ department.id }}" {% if department.id == teacher.department.id %}selected{% endif %}>{{ department.name }}</option>
                                          {% endfor %}
                                       </select>
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Qualification</label>
                                       <input type="text" class="form-control" name="qualification" value="{{ teacher.qualification }}">
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Experience (Years)</label>
                                       <input type="number" class="form-control" name="experience_years" value="{{ teacher.experience_years }}" min="0">
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Salary</label>
                                       <input type="number" class="form-control" name="salary" value="{{ teacher.salary }}" step="0.01" min="0">
                                    </div>
                                 </div>
                                 <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                       <label>Current Image</label>
                                       {% if teacher.teacher_image %}
                                       <img src="{{ teacher.teacher_image.url }}" alt="Current Image" width="100" class="mb-2">
                                       {% endif %}
                                       <input type="file" class="form-control" name="teacher_image" accept="image/*">
                                       <small class="form-text text-muted">Leave empty to keep current image</small>
                                    </div>
                                 </div>
                                 <div class="col-12">
                                    <div class="form-group">
                                       <label>Address</label>
                                       <textarea class="form-control" name="address" rows="3">{{ teacher.address }}</textarea>
                                    </div>
                                 </div>
                                 <div class="col-12">
                                    <button type="submit" class="btn btn-primary">Update Teacher</button>
                                    <a href="{% url 'faculty:teacher_list' %}" class="btn btn-secondary ml-2">Cancel</a>
                                 </div>
                              </div>
                           </form>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>

{% endblock %}
